[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt",
    "python verify_spacy.py || echo 'spaCy verification failed but continuing...'"
]

[phases.setup]
aptPkgs = []

[start]
cmd = "gunicorn --bind 0.0.0.0:$PORT --timeout 300 --workers 2 --log-level info src.app:app"
