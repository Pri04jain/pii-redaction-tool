[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt"
]

[phases.setup]
cmds = [
    "chmod +x install_spacy_model.sh",
    "bash install_spacy_model.sh"
]

[start]
cmd = "gunicorn --bind 0.0.0.0:$PORT --timeout 300 --workers 2 --log-level info src.app:app"
